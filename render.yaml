services:
  - type: web
    name: riva-snap
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      # Secrets: Render prompts for these when you deploy the blueprint.
      # OpenAI takes precedence over Groq when both are set (see app/vision.py).
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FDC_API_KEY
        sync: false
      # Keep debug payloads on during the tuning phase.
      - key: RIVA_SCAN_DEBUG
        value: "true"
      # Supabase backend (sign-in + logging). Set all three or none.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
