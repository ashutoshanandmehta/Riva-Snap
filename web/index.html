<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F6D5B">
<title>Riva Snap</title>
<style>
  :root {
    --brand: #1F6D5B; --brand-deep: #235C4F; --brand-soft: #D8EAE2;
    --brand-wash: #EDF5F1; --bg: #F1F7F3; --surface: #FFFFFF;
    --text: #101614; --text-2: #66716C; --text-3: #93A09A;
    --danger: #C24A3F; --radius: 20px; --outline: transparent;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand: #4BB596; --brand-deep: #2F8371; --brand-soft: #22322D;
      --brand-wash: #1A2622; --bg: #0C110F; --surface: #171D1A;
      --text: #F2F5F3; --text-2: #9BA6A0; --text-3: #6E7A74;
      --outline: rgba(255,255,255,.08);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 16px/1.45 -apple-system, "SF Pro Text", Roboto, system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    padding: max(16px, env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    max-width: 480px; margin: 0 auto;
  }
  header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo { width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand), var(--brand-deep));
    display: grid; place-items: center; color: #fff; font-size: 15px; }
  header h1 { font-size: 19px; }
  header small { color: var(--text-3); font-size: 11px; margin-left: auto; }

  .card { background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--outline);
    box-shadow: 0 6px 14px rgba(0,0,0,.06); padding: 16px; margin-bottom: 14px; }

  .modes { display: flex; gap: 8px; margin-bottom: 10px; }
  .mode { flex: 1; padding: 9px 4px; border-radius: 999px; font-size: 13.5px;
    font-weight: 600; border: 1px solid var(--brand-soft); background: var(--bg);
    color: var(--text-2); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .mode.active { background: var(--brand-deep); color: #fff; border-color: transparent; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { border: 0; border-radius: 14px; padding: 14px 12px; font-size: 15px;
    font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .btn-primary { background: var(--brand-deep); color: #fff; }
  .btn-soft { background: var(--brand-wash); color: var(--brand); }
  .btn:active { opacity: .85; }
  .btn[disabled] { opacity: .45; }

  #hint { width: 100%; margin-top: 10px; padding: 12px; font-size: 14px;
    border: 1px solid var(--brand-soft); border-radius: 12px;
    background: var(--bg); color: var(--text); }

  #previewWrap { display: none; position: relative; }
  #preview { width: 100%; border-radius: 14px; display: block; max-height: 340px; object-fit: cover; }
  #previewWrap.scanning::after { content: ""; position: absolute; inset: 0;
    border-radius: 14px; background: linear-gradient(120deg, transparent 30%,
    rgba(255,255,255,.35) 50%, transparent 70%); background-size: 220% 100%;
    animation: sweep 1.1s linear infinite; }
  @keyframes sweep { to { background-position: -220% 0; } }
  .detected-pill { position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: var(--surface); color: var(--text); padding: 7px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,.18);
    white-space: nowrap; max-width: 90%; overflow: hidden; text-overflow: ellipsis; display: none; }
  .detected-pill .dot { color: var(--brand); }

  .overline { font-size: 11px; font-weight: 600; letter-spacing: .8px;
    text-transform: uppercase; color: var(--text-2); }
  .item-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .item-name { font-size: 21px; font-weight: 700; }
  .item-sub { color: var(--text-2); font-size: 13px; margin-top: 2px; }
  .badge { border-radius: 999px; padding: 6px 11px; font-size: 10.5px; font-weight: 700;
    letter-spacing: .7px; white-space: nowrap; }
  .badge.matched { background: var(--brand-wash); color: var(--brand); }
  .badge.estimate { background: var(--brand-soft); color: var(--text-2); }

  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .tile { background: var(--brand-wash); border-radius: 14px; padding: 12px; text-align: center; }
  .tile b { display: block; font-size: 22px; color: var(--brand); }
  .tile span { font-size: 11.5px; color: var(--text-2); }

  .alts { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
  .alt-chip { background: var(--bg); border: 1px solid var(--brand-soft); color: var(--text-2);
    padding: 6px 12px; border-radius: 999px; font-size: 12.5px; }

  .item-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }

  .meta { color: var(--text-3); font-size: 12px; text-align: center; margin: 4px 0 10px; }
  .error { color: var(--danger); font-weight: 600; }

  details { margin-top: 6px; }
  summary { color: var(--text-2); font-size: 13px; cursor: pointer; }
  pre { background: var(--surface); border: 1px solid var(--brand-soft); border-radius: 12px;
    padding: 12px; font-size: 11px; overflow-x: auto; margin-top: 8px; max-height: 300px; }
  .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: var(--brand-deep); color: #fff; padding: 11px 18px; border-radius: 999px;
    font-size: 13.5px; box-shadow: 0 8px 18px rgba(0,0,0,.25); opacity: 0;
    transition: opacity .25s; pointer-events: none; max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; }
  #results { display: none; }
</style>
</head>
<body>
<header>
  <div class="logo">≋</div>
  <h1>Riva Snap</h1>
</header>

<div class="card">
  <div class="modes" id="modes">
    <button class="mode active" data-mode="auto">Auto</button>
    <button class="mode" data-mode="food">Food</button>
    <button class="mode" data-mode="water">Water</button>
  </div>
  <div class="actions">
    <button class="btn btn-primary" id="captureBtn">Capture</button>
    <button class="btn btn-soft" id="galleryBtn">Gallery</button>
  </div>
  <input type="file" id="captureInput" accept="image/*" capture="environment" hidden>
  <input type="file" id="galleryInput" accept="image/*" hidden>
  <input type="text" id="hint" placeholder="Add a hint if you like, such as “dinner at Chipotle”">
</div>

<div class="card" id="previewCard" style="display:none">
  <div id="previewWrap">
    <img id="preview" alt="Selected photo">
    <div class="detected-pill" id="detectedPill"><span class="dot">●</span> <span id="detectedText"></span></div>
  </div>
  <div class="actions" style="margin-top:12px">
    <button class="btn btn-primary" id="scanBtn">Scan</button>
    <button class="btn btn-soft" id="resetBtn">Clear</button>
  </div>
</div>

<div id="results"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
let selectedFile = null;
let lastResponse = null;
let scanMode = "auto";

// --- log-mode selector ---------------------------------------------------------
for (const button of document.querySelectorAll(".mode")) {
  button.onclick = () => {
    scanMode = button.dataset.mode;
    document.querySelectorAll(".mode").forEach(b => b.classList.toggle("active", b === button));
  };
}

// --- pick / preview ----------------------------------------------------------
$("captureBtn").onclick = () => $("captureInput").click();
$("galleryBtn").onclick = () => $("galleryInput").click();
for (const id of ["captureInput", "galleryInput"]) {
  $(id).addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    $("preview").src = URL.createObjectURL(file);
    $("previewCard").style.display = "block";
    $("previewWrap").style.display = "block";
    $("results").style.display = "none";
    $("detectedPill").style.display = "none";
    e.target.value = "";
  });
}
$("resetBtn").onclick = () => {
  selectedFile = null;
  $("previewCard").style.display = "none";
  $("results").style.display = "none";
};

// --- scan --------------------------------------------------------------------
$("scanBtn").onclick = async () => {
  if (!selectedFile) return;
  const wrap = $("previewWrap");
  wrap.classList.add("scanning");
  $("scanBtn").disabled = true;
  $("results").style.display = "none";
  const started = performance.now();

  const form = new FormData();
  form.append("image", selectedFile);
  form.append("mode", scanMode);
  const hint = $("hint").value.trim();
  if (hint) form.append("hint", hint);

  try {
    const response = await fetch("/v1/scan", { method: "POST", body: form });
    const payload = await response.json();
    if (!response.ok) throw new Error(payload.detail || response.statusText);
    lastResponse = payload;
    render(payload, Math.round(performance.now() - started));
  } catch (error) {
    $("results").innerHTML =
      `<div class="card"><p class="error">Scan failed</p>
       <p class="item-sub">${escapeHtml(String(error.message || error))}</p></div>`;
    $("results").style.display = "block";
  } finally {
    wrap.classList.remove("scanning");
    $("scanBtn").disabled = false;
  }
};

// --- render ------------------------------------------------------------------
function render(data, clientMs) {
  const first = data.items[0];
  if (first) {
    $("detectedText").textContent = first.name + " detected";
    $("detectedPill").style.display = "block";
  } else if (data.water) {
    $("detectedText").textContent =
      (data.scan_type === "water" ? "water" : "drink") + " detected";
    $("detectedPill").style.display = "block";
  }

  let html = "";

  if (data.mode_mismatch) {
    const wanted = data.requested_mode === "water" ? "water" : "food";
    const got = data.scan_type === "water" ? "water"
      : data.scan_type === "beverage" ? "a beverage" : "food";
    html += `<div class="card" style="background:var(--brand-wash)">
      <div class="overline" style="color:var(--brand)">Heads up</div>
      <p style="margin-top:6px;font-size:14.5px">You chose to log <b>${wanted}</b>,
      but this looks like <b>${got}</b>, so here is what the photo actually shows.
      ${data.requested_mode === "water" && data.scan_type === "beverage"
        ? "Only plain water counts toward your hydration goal." : ""}</p>
    </div>`;
  }

  if (data.scan_type === "not_food") {
    html += `<div class="card"><p class="item-name">No food detected</p>
      <p class="item-sub">${escapeHtml(data.reason || "Try again with food or a drink in frame.")}</p></div>`;
  }

  for (const item of data.items) {
    html += `<div class="card">
      <div class="item-head">
        <div>
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-sub">${escapeHtml(item.portion_desc)}, estimated from the photo</div>
        </div>
        <span class="badge ${item.matched ? "matched" : "estimate"}">
          ${item.matched ? "✓ MATCHED" : "AI ESTIMATE"}</span>
      </div>
      <div class="tiles">
        <div class="tile"><b>${item.calories}</b><span>Calories</span></div>
        <div class="tile"><b>${item.protein_grams}g</b><span>Protein</span></div>
      </div>
      ${item.alternatives.length ? `<div class="alts">
        <span class="alt-chip">Not ${escapeHtml(shortName(item.name))}?</span>
        ${item.alternatives.map(a => `<span class="alt-chip">${escapeHtml(a)}</span>`).join("")}
      </div>` : ""}
      <div class="item-actions">
        <button class="btn btn-soft" onclick="toast('Portion editing is coming in the app')">Edit</button>
        <button class="btn btn-primary" onclick="accept()">Accept</button>
      </div>
    </div>`;
  }

  if (data.water) {
    const w = data.water;
    const glassWord = w.glasses === 1 ? "glass" : "glasses";
    const liters = w.volume_ml >= 1000 ? ` (${(w.volume_ml / 1000).toFixed(1)} L)` : "";
    const label = data.scan_type === "water" ? "water" : cap(data.scan_type);
    html += `<div class="card">
      <div class="item-head">
        <div>
          <div class="item-name">${w.glasses} ${glassWord} of ${escapeHtml(label)}</div>
          <div class="item-sub">${escapeHtml(w.container_type)}, estimated from the photo</div>
        </div>
        <span class="badge estimate">AI ESTIMATE</span>
      </div>
      <div class="tiles">
        <div class="tile"><b>${w.volume_oz}</b><span>fl oz</span></div>
        <div class="tile"><b>${w.volume_ml}</b><span>ml${liters}</span></div>
      </div>
      ${data.scan_type === "water" ? `<div class="item-actions">
        <button class="btn btn-soft" onclick="toast('Volume editing lands in the app')">Edit</button>
        <button class="btn btn-primary" onclick="accept()">Accept</button>
      </div>` : ""}
    </div>`;
  }

  if (data.items.length > 1) {
    html += `<div class="card">
      <div class="overline">Plate total</div>
      <div class="tiles">
        <div class="tile"><b>${data.totals.calories}</b><span>Calories</span></div>
        <div class="tile"><b>${data.totals.protein_grams}g</b><span>Protein</span></div>
      </div>
    </div>`;
  }

  html += `<details><summary>Raw JSON (tuning)</summary><pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre></details>`;

  $("results").innerHTML = html;
  $("results").style.display = "block";
}

function accept() {
  const delta = lastResponse ? lastResponse.nutrition_day_delta : null;
  if (!delta) return;
  const message = delta.water_ounces > 0
    ? `Logged ${delta.water_ounces} oz of water (test mode, nothing is saved yet)`
    : `Logged ${delta.calories} kcal and ${delta.protein_grams}g protein (test mode, nothing is saved yet)`;
  toast(message);
}

// --- helpers -----------------------------------------------------------------
function toast(message) {
  const el = $("toast");
  el.textContent = message;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 3200);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function shortName(name) { return name.split(" ").slice(-1)[0] || name; }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
</script>
</body>
</html>
